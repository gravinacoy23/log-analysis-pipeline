# Log Analysis Pipeline Configuration

paths:
  raw_log: data/raw/
  output_dir: output/

log_format:
  timestamp_format: "%Y-%m-%dT%H:%M:%SZ"

analysis:
  error_keywords:
    - ERROR
    - WARNING
    - CRITICAL

output:
  save_summary: true
  save_errors: true

services:
  - shopping
  - pricing
  - booking

messages:
  shopping:
   - "FareSearch completed"
   - "AirShopping completed"
   - "No fares available"
  pricing:
    - "OfferPrice completed"
    - "Dynamic price applied"
    - "Fare rules evaluated"
  booking:
    - "Booking confirmed"
    - "Booking failed"
    - "Seat booked"

levels:
  - INFO
  - WARNING
  - ERROR

columns:
  - timestamp
  - service
  - user
  - cpu
  - mem
  - response_time
  - level
  - msg
